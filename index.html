<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#211E1A">
<meta name="description" content="Catalogue your Winsor & Newton Promarker collection, measure real swatch colours from photos, and explore hues and harmonies. Free, offline, no account — all data stays on your device.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Promarker Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap');
  :root { --ink:#211E1A; --paper:#FAF8F2; --pencil:#D9D2C4; --faint:#8C8577; --danger:#A4442E; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:system-ui,-apple-system,sans-serif; }
  button { font:inherit; cursor:pointer; }
  input, select { font:inherit; }
  h1 { font-family:'Caveat',cursive; font-size:34px; font-weight:700; line-height:1; margin:0; }
  .cav { font-family:'Caveat',cursive; font-weight:600; }
  header { padding:18px 16px 0; border-bottom:1.6px solid var(--ink); }
  .rowsb { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .sub { font-size:12.5px; color:var(--faint); }
  .btn { border:1.5px solid var(--ink); background:transparent; color:var(--ink); border-radius:8px; padding:6px 12px; font-size:13px; }
  .btn.fill { background:var(--ink); color:var(--paper); }
  .btn.danger { border-color:var(--danger); color:var(--danger); }
  .tabs { display:flex; gap:18px; margin-top:12px; }
  .tab { background:none; border:none; padding:6px 2px 10px; font-size:14.5px; color:var(--faint); border-bottom:3px solid transparent; }
  .tab.on { color:var(--ink); font-weight:700; border-bottom-color:var(--ink); }
  .controls { padding:12px 16px 4px; position:sticky; top:0; background:var(--paper); z-index:5; border-bottom:1px solid var(--pencil); }
  .search { width:100%; padding:9px 12px; border:1.4px solid var(--ink); border-radius:10px; background:#fff; outline:none; font-size:14px; }
  .chips { display:flex; gap:8px; overflow-x:auto; padding:10px 0; scrollbar-width:none; }
  .chip { border:1.4px solid var(--ink); background:transparent; color:var(--ink); padding:5px 12px; border-radius:999px; font-size:13px; white-space:nowrap; }
  .chip.on { background:var(--ink); color:var(--paper); }
  main { padding:8px 16px 90px; }
  .famhead { display:flex; align-items:baseline; gap:8px; margin:18px 0 10px; }
  .famhead .cav { font-size:24px; }
  .famhead .n { font-size:12px; color:var(--faint); }
  .famhead .rule { flex:1; border-bottom:1px solid var(--pencil); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(102px,1fr)); gap:12px; }
  .card { background:transparent; border:none; padding:0; text-align:left; }
  .card:active { transform:translateY(1px); }
  .strip { display:flex; width:100%; height:84px; border:1.6px solid var(--ink); background:#fff; position:relative; }
  .strip > div { flex:1; }
  .strip > div + div { border-left:1px solid rgba(33,30,26,.35); }
  .dot { position:absolute; top:4px; right:4px; width:9px; height:9px; border-radius:50%; background:var(--ink); border:1.5px solid var(--paper); }
  .code { font-family:ui-monospace,Menlo,monospace; font-size:12.5px; font-weight:700; margin-top:5px; }
  .name { font-size:11.5px; color:var(--faint); line-height:1.25; }
  .hint { margin-top:28px; font-size:11.5px; color:var(--faint); line-height:1.5; }
  .empty { text-align:center; padding:44px 20px; }
  .empty .cav { font-size:30px; }
  .empty p { color:var(--faint); font-size:14px; line-height:1.5; }
  .overlay { position:fixed; inset:0; background:rgba(33,30,26,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center; }
  .overlay.center { align-items:center; padding:12px; background:rgba(33,30,26,.6); z-index:50; }
  .sheet { background:var(--paper); width:min(560px,100%); max-height:92vh; overflow-y:auto; border-radius:18px 18px 0 0; border:1.6px solid var(--ink); border-bottom:none; padding:16px 18px 26px; }
  .overlay.center .sheet { border-radius:14px; border-bottom:1.6px solid var(--ink); max-height:90vh; padding:16px; }
  .layerrow { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--pencil); }
  .swx { width:44px; height:44px; border:1.5px solid var(--ink); flex-shrink:0; margin-top:2px; }
  .mono { font-family:ui-monospace,Menlo,monospace; }
  .harmrow { display:flex; gap:8px; overflow-x:auto; padding:6px 0; align-items:flex-start; }
  .harmchip { background:transparent; border:none; padding:0; text-align:center; flex-shrink:0; width:62px; display:flex; flex-direction:column; }
  .harmchip .sw { height:40px; flex-shrink:0; border:1.5px solid var(--ink); }
  .rangerow { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--pencil); }
  .rangerow .sw { width:34px; height:34px; border:1.5px solid var(--ink); flex-shrink:0; }
  .field { width:100%; padding:9px 12px; border:1.4px solid var(--ink); border-radius:10px; background:#fff; margin-top:4px; font-size:14px; }
  label.f { display:block; font-size:12.5px; margin-top:10px; }
  .droparea { display:block; border:1.6px dashed var(--ink); border-radius:12px; padding:36px 14px; text-align:center; font-size:14px; color:var(--faint); }
  canvas { width:100%; border:1.5px solid var(--ink); border-radius:8px; touch-action:manipulation; cursor:crosshair; }
  #toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); padding:8px 16px; border-radius:999px; font-size:13px; z-index:60; display:none; }
  .about p { font-size:14px; line-height:1.6; }
  .about h2 { font-family:'Caveat',cursive; font-size:26px; margin:20px 0 6px; }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; } }
</style>

/* ============ colour math ============ */
function hexToRgb(h){ const m=/^#?([0-9a-f]{6})$/i.exec(h||""); if(!m) return [0,0,0]; const n=parseInt(m[1],16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbToHex(r,g,b){ return "#"+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0")).join("").toUpperCase(); }
function inkPass(hex){ const [r,g,b]=hexToRgb(hex); const a=0.55; const f=c=>c*(1-a)+(c*c/255)*a; return rgbToHex(f(r),f(g),f(b)); }
function estimateLayers(hex){ const l2=inkPass(hex); return [hex.toUpperCase(), l2, inkPass(l2)]; }
function hexToLch(hex){  let [r,g,b]=hexToRgb(hex).map(v=>v/255);
  const lin=c=> c<=0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  r=lin(r); g=lin(g); b=lin(b);
  const X=(0.4124*r+0.3576*g+0.1805*b)/0.95047, Y=0.2126*r+0.7152*g+0.0722*b, Z=(0.0193*r+0.1192*g+0.9505*b)/1.08883;
  const f=t=> t>0.008856 ? Math.cbrt(t) : 7.787*t+16/116;
  const fx=f(X), fy=f(Y), fz=f(Z);
  const L=116*fy-16, A=500*(fx-fy), B=200*(fy-fz);
  const C=Math.sqrt(A*A+B*B);
  let H=Math.atan2(B,A)*180/Math.PI; if(H<0) H+=360;
  return {L,C,H};
}
function hexToLab(hex){
  let [r,g,b]=hexToRgb(hex).map(v=>v/255);
  const lin=c=> c<=0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  r=lin(r); g=lin(g); b=lin(b);
  const X=(0.4124*r+0.3576*g+0.1805*b)/0.95047, Y=0.2126*r+0.7152*g+0.0722*b, Z=(0.0193*r+0.1192*g+0.9505*b)/1.08883;
  const f=t=> t>0.008856 ? Math.cbrt(t) : 7.787*t+16/116;
  const fx=f(X), fy=f(Y), fz=f(Z);
  return {L:116*fy-16, a:500*(fx-fy), b:200*(fy-fz)};
}
function labDist(p,q){ return Math.sqrt((p.L-q.L)**2+(p.a-q.a)**2+(p.b-q.b)**2); }
function parseColorInput(raw){
  if(!raw) return null;
  let s=raw.trim().toLowerCase();
  // hex: #abc, #aabbcc, or bare
  let m=/^#?([0-9a-f]{6})$/.exec(s);
  if(m) return "#"+m[1].toUpperCase();
  m=/^#?([0-9a-f]{3})$/.exec(s);
  if(m) return "#"+m[1].split("").map(c=>c+c).join("").toUpperCase();
  // rgb: "12,34,56" or "rgb(12,34,56)" or "12 34 56"
  m=/^(?:rgb\s*\(?)?\s*(\d{1,3})[\s,]+(\d{1,3})[\s,]+(\d{1,3})\s*\)?$/.exec(s);
  if(m){
    const v=[m[1],m[2],m[3]].map(Number);
    if(v.every(n=>n>=0&&n<=255)) return rgbToHex(v[0],v[1],v[2]);
  }
  return null;
}
function hexToHsl(hex){
  let [r,g,b]=hexToRgb(hex).map(v=>v/255);
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0;
  if(d){ if(max===r) h=((g-b)/d)%6; else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  const l=(max+min)/2, s= d===0 ? 0 : d/(1-Math.abs(2*l-1));
  return {h:Math.round(h), s:Math.round(s*100), l:Math.round(l*100)};
}
const M_SECTORS=["R","YR","Y","GY","G","BG","B","PB","P","RP"];
const M_ANCHORS=[25,60,92,122,152,195,235,282,315,345];
function labHueToMunsellDeg(h){
  for(let i=0;i<10;i++){
    const a=M_ANCHORS[i]; let b=M_ANCHORS[(i+1)%10]; let hh=h;
    if(b<a){ b+=360; if(hh<a) hh+=360; }
    if(hh>=a && hh<=b){ const t=(hh-a)/(b-a); return ((i+t)*36)%360; }
  }
  return 0;
}
function munsellNotation(hex){

  let step=5+((deg%36)/36)*10, idx=Math.floor(deg/36);
  if(step>10){ step-=10; idx=(idx+1)%10; }
  return {text: step.toFixed(1)+M_SECTORS[idx]+" "+V.toFixed(1)+"/"+Chr.toFixed(1), neutral:false};
}
function hueDist(a,b){ const d=Math.abs(a-b)%360; return d>180 ? 360-d : d; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============ storage: localStorage with in-memory fallback ============ */
const STORE_KEY="promarker-studio-public-v1";
let memoryStore=null;
let storageOK=null; // null=unknown, true/false once tested
function storageAvailable(){
  if(storageOK!==null) return storageOK;
  try{
    const t="__pmk_test__";
    localStorage.setItem(t,"1"); localStorage.removeItem(t);
    storageOK=true;
  }catch(e){ storageOK=false; }
  return storageOK;
}
function loadState(){
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw){ const d=JSON.parse(raw); return {owned:d.owned||[], overrides:d.overrides||{}, customs:d.customs||[]}; } }
  catch(e){ if(memoryStore) return memoryStore; }
  return memoryStore ? JSON.parse(JSON.stringify(memoryStore)) : {owned:[], overrides:{}, customs:[]};
}
function saveState(){
  // keep an independent in-memory copy so a later reassignment of `state` can't corrupt the fallback
  memoryStore=JSON.parse(JSON.stringify(state));
  try{
    const payload=JSON.stringify(state);
    localStorage.setItem(STORE_KEY, payload);
    // read-back verification: confirm the write actually persisted
    if(localStorage.getItem(STORE_KEY)!==payload) throw new Error("verify failed");
    return true;
  }catch(e){
    toast("Saved on this page only — storage is blocked, so it won't survive a reload. Export a backup to be safe.");
    return false;
  }
}

/* ============ toast ============ */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  if(!t) return;
  t.textContent=msg; t.style.display="block";
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.display="none"; }, 3200);
}

function ownedColors(){
  const off=state.owned.filter(c=>byCode[c]).map(c=>{ const [code,name,fam,hex]=byCode[c]; return {code,name,family:fam,hex,custom:false}; });
  const cus=state.customs.map(c=>({...c, custom:true}));
  return off.concat(cus);
}
function findOwned(code){ return ownedColors().find(c=>c.code===code); }
function layersFor(c){
  const ov=state.overrides[c.code];
  const est=estimateLayers(c.hex);
  if(!ov) return {layers:est, measured:[false,false,false]};
  return {layers:est.map((e,i)=> (ov.layers&&ov.layers[i]) || e), measured:[0,1,2].map(i=> !!(ov.layers&&ov.layers[i]))};
}

function nearestMarkers(targetHex, scope){
  const target=hexToLab(targetHex);
  let pool;
  if(scope==="owned"){
    pool=ownedColors().map(c=>({code:c.code, name:c.name, family:c.family, hex:layersFor(c).layers[0], owned:true, custom:c.custom}));
  } else {
    const ownedSet=new Set(ownedColors().map(c=>c.code));
    pool=OFFICIAL.map(o=>({code:o[0], name:o[1], family:o[2], hex: ownedSet.has(o[0]) ? layersFor({code:o[0],hex:o[3]}).layers[0] : o[3], owned:ownedSet.has(o[0])}));
    ownedColors().filter(c=>c.custom).forEach(c=> pool.push({code:c.code,name:c.name,family:c.family,hex:layersFor(c).layers[0],owned:true,custom:true}));
  }
  return pool.map(c=>({...c, d:labDist(target, hexToLab(c.hex))})).sort((a,b)=>a.d-b.d).slice(0,6);
}
function matchLabel(d){
  if(d<2) return "near-perfect";
  if(d<5) return "very close";
  if(d<10) return "close";
  if(d<20) return "in the ballpark";
  return "loose";
}

/* ---- detail ---- */
const SCHEMES=[
  {name:"Complementary", offsets:[180]},
  {name:"Analogous", offsets:[-30,30]},
  {name:"Triadic", offsets:[120,240]},
  {name:"Split-complementary", offsets:[150,210]},
];
function harmoniesFor(color){
  const base=hexToLch(layersFor(color).layers[0]);
  if(base.C<8) return null;
  const pool=ownedColors().filter(c=>c.code!==color.code)
    .map(c=>({c, lch:hexToLch(layersFor(c).layers[0])}))
    .filter(x=>x.lch.C>=11);
  return SCHEMES.map(s=>{
    let matches=[];
    s.offsets.forEach(off=>{
      const target=(base.H+off+360)%360;
      matches=matches.concat(pool.map(x=>({...x, d:hueDist(x.lch.H,target)})).filter(x=>x.d<=24).sort((a,b)=>a.d-b.d).slice(0,3));
    });
    matches=matches.filter((m,i,arr)=>arr.findIndex(y=>y.c.code===m.c.code)===i);
    return {name:s.name, matches};
  });
}
function openDetail(code){
  const c=findOwned(code);
  if(!c) return;
  const {layers,measured}=layersFor(c);
  const harm=harmoniesFor(c);
  let html='<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div><div class="mono" style="font-weight:700;font-size:15px">'+escapeHtml(c.code)+'</div>'+

    '<button class="btn" data-x="close">Close</button></div>'+
    '<div style="margin-top:14px">'+stripHtml(layers).replace('height:84px','height:64px')+"</div>";
  [0,1,2].forEach(i=>{
    const [r,g,b]=hexToRgb(layers[i]);
    const lch=hexToLch(layers[i]), hsl=hexToHsl(layers[i]), mun=munsellNotation(layers[i]);
    html+='<div class="layerrow"><div class="swx" style="background:'+layers[i]+'"></div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+(i+1)+" layer"+(i?"s":"")+
      ' <span style="font-weight:400;color:#8C8577;font-size:12px">'+(measured[i]?"measured":"estimate")+"</span></div>"+
      '<div class="mono" style="font-size:12px">'+layers[i]+" · rgb("+r+", "+g+", "+b+")</div>"+
      '<div class="mono" style="font-size:11.5px;color:#8C8577;margin-top:2px">≈'+mun.text+" · hue "+Math.round(lch.H)+"° · chroma "+lch.C.toFixed(0)+" · sat "+hsl.s+"%</div></div>"+
      '<button class="btn" data-sample="'+i+'">Sample</button></div>';
  });
  html+='<div style="margin-top:16px"><div class="cav" style="font-size:24px">From your collection</div>';
  if(!harm) html+='<div class="sub" style="margin-top:4px">This colour is close to neutral, so hue-based schemes do not apply. Neutrals pair with everything.</div>';
  else harm.forEach(s=>{
    html+='<div style="margin-top:10px"><div style="font-size:12.5px;font-weight:600">'+s.name+"</div>";
    if(!s.matches.length) html+='<div style="font-size:12px;color:#8C8577">Nothing you own sits near that hue.</div>';
    else html+='<div class="harmrow">'+s.matches.map(m=>
      '<button class="harmchip" data-jump="'+escapeHtml(m.c.code)+'"><div class="sw" style="background:'+layersFor(m.c).layers[0]+'"></div>'+
      '<div class="mono" style="font-size:10.5px;font-weight:700;margin-top:3px">'+escapeHtml(m.c.code)+'</div>'+
      '<div style="font-size:9.5px;color:#8C8577;line-height:1.15">'+escapeHtml(m.c.name)+"</div></button>").join("")+"</div>";
    html+="</div>";
  });
  html+="</div>";
  html+='<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">'+
    (state.overrides[c.code]?'<button class="btn" data-x="reset">Reset to estimates</button>':"")+
    '<button class="btn danger" data-x="remove">'+(c.custom?"Delete colour":"Remove from collection")+"</button></div>";
  const el=sheet(html);
  el.querySelector('[data-x="close"]').addEventListener("click", closeModal);
  el.querySelectorAll("[data-sample]").forEach(b=> b.addEventListener("click", ()=>{
    const i=+b.dataset.sample;
    openSampler(c.code+" — "+(i+1)+" layer"+(i?"s":""), hex=>{
      const ov=state.overrides[c.code]||{layers:[null,null,null]};
      ov.layers[i]=hex;
      state.overrides[c.code]=ov;
      saveState(); toast("Saved"); openDetail(c.code); renderAll();
    });
  }));
  el.querySelectorAll("[data-jump]").forEach(b=> b.addEventListener("click", ()=>openDetail(b.dataset.jump)));
  const rst=el.querySelector('[data-x="reset"]');
  if(rst) rst.addEventListener("click", ()=>{ delete state.overrides[c.code]; saveState(); openDetail(c.code); renderAll(); });
  el.querySelector('[data-x="remove"]').addEventListener("click", ()=>{
    delete state.overrides[c.code];
    if(c.custom) state.customs=state.customs.filter(x=>x.code!==c.code);
    else state.owned=state.owned.filter(x=>x!==c.code);
    saveState(); closeModal(); renderAll(); toast(c.code+" removed");
  });
}

    const s=q.trim().toLowerCase();
    const avail=OFFICIAL.filter(o=>!ownedSet.has(o[0])).filter(o=>!s||o[0].toLowerCase().includes(s)||o[1].toLowerCase().includes(s));
    const groups=FAMILIES.map(f=>({f, items:avail.filter(o=>o[2]===f)})).filter(g=>g.items.length);
    listEl.previousElementSibling.textContent=avail.length+" colours available. Tap Add — each goes straight into your collection with an estimated colour you can re-measure any time.";
    listEl.innerHTML=groups.map(g=>
      '<section style="margin-top:14px"><div class="cav" style="font-size:21px">'+g.f+"</div>"+
      g.items.map(o=>'<div class="rangerow"><div class="sw" style="background:'+o[3]+'"></div>'+
        '<div style="flex:1;min-width:0"><span class="mono" style="font-weight:700;font-size:12.5px">'+escapeHtml(o[0])+'</span>'+
        '<span style="font-size:12.5px;margin-left:8px">'+escapeHtml(o[1])+"</span></div>"+
        '<button class="btn" data-add="'+escapeHtml(o[0])+'">Add</button></div>').join("")+"</section>").join("") ||
      '<p class="sub" style="margin-top:14px">Nothing left to add — you own the entire range. Respect.</p>';
    listEl.querySelectorAll("[data-add]").forEach(b=> b.addEventListener("click", ()=>{
      state.owned.push(b.dataset.add); saveState(); toast(b.dataset.add+" added"); renderRangeList(); renderAll();
    }));
  }
  function renderBody(){
    if(mode==="range"){
      body.innerHTML='<input class="field" id="rq" placeholder="Search the range…" style="margin-top:12px" value="'+escapeHtml(q)+'">'+
        '<div class="sub" style="margin-top:8px"></div><div id="rangeList"></div>';
      const rq=body.querySelector("#rq");
      rq.addEventListener("input", ()=>{ q=rq.value; renderRangeList(); });
      renderRangeList();
    } else {
      body.innerHTML='<label class="f">Code on the pen<input class="field" id="cCode" placeholder="e.g. a discontinued code"><div class="sub" id="cClash" style="color:#A4442E;display:none;margin-top:3px">That code is already in your collection.</div></label>'+
        '<label class="f">Colour name<input class="field" id="cName"></label>'+
        '<label class="f">Family<select class="field" id="cFam">'+FAMILIES.map(f=>"<option>"+f+"</option>").join("")+"</select></label>"+
        '<div style="display:flex;align-items:center;gap:12px;margin-top:14px"><div class="swx" id="cSw" style="background:#CCCCCC;margin-top:0"></div>'+
        '<div class="mono" id="cHexTxt" style="flex:1;font-size:13px">#CCCCCC<br>rgb(204, 204, 204)</div>'+
        '<button class="btn" id="cSample">Sample from photo</button></div>'+
        '<button class="btn fill" id="cAdd" style="margin-top:18px;width:100%;padding:12px;font-size:15px" disabled>Add to collection</button>';
      let hx="#CCCCCC";
      const code=body.querySelector("#cCode"), name=body.querySelector("#cName"), fam=body.querySelector("#cFam");
      const addB=body.querySelector("#cAdd"), clash=body.querySelector("#cClash");
      function check(){
        const cd=code.value.trim().toUpperCase();
        const dup=ownedColors().some(c=>c.code===cd);
        clash.style.display=dup?"block":"none";
        addB.disabled=!(cd&&name.value.trim()&&!dup);
      }
      code.addEventListener("input",check); name.addEventListener("input",check);
      body.querySelector("#cSample").addEventListener("click", ()=>openSampler(code.value.trim().toUpperCase()||"new colour", h=>{
        hx=h; body.querySelector("#cSw").style.background=h;
        body.querySelector("#cHexTxt").innerHTML=h+"<br>rgb("+hexToRgb(h).join(", ")+")";
      }));
      addB.addEventListener("click", ()=>{
        state.customs.push({code:code.value.trim().toUpperCase(), name:name.value.trim(), family:fam.value, hex:hx});
        saveState(); closeModal(); renderAll(); toast("Added");
      });
    }
  }
  renderBody();
}

/* ---- photo eyedropper ---- */
function openSampler(title, cb){
  const wrap=document.createElement("div");
  wrap.className="overlay center";
  wrap.innerHTML='<div class="sheet">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<div style="font-weight:700;font-size:14px">Sample from photo · <span class="mono">'+escapeHtml(title)+'</span></div>'+
    '<button class="btn" data-x="c">✕</button></div>'+
    '<label class="droparea" id="drop">Tap to choose or take a photo of your swatch<input type="file" accept="image/*" style="display:none"></label>'+
    '<canvas style="display:none"></canvas>'+
    '<div class="sub" id="samphint" style="display:none;margin-top:6px">Tap the photo where the ink shows this many layers. Tap again to re-sample. <label style="text-decoration:underline">Different photo<input type="file" accept="image/*" style="display:none"></label></div>'+
    '<div id="pickrow" style="display:none;align-items:center;gap:12px;margin-top:12px">'+
    '<div class="swx" id="pickSw" style="margin-top:0"></div><div class="mono" id="pickTxt" style="flex:1;font-size:13px"></div>'+
    '<button class="btn fill" id="useBtn" style="padding:9px 14px;font-weight:600">Use this colour</button></div></div>';
  document.body.appendChild(wrap);
  const close=()=>wrap.remove();
  wrap.addEventListener("click", e=>{ if(e.target===wrap) close(); });
  wrap.querySelector('[data-x="c"]').addEventListener("click", close);
  const cv=wrap.querySelector("canvas"), ctx=cv.getContext("2d");
  let picked=null;
  function loadFile(file){
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const cap=1600, sc=Math.min(1, cap/Math.max(img.width,img.height));
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      cv.style.display="block";
      wrap.querySelector("#drop").style.display="none";
      wrap.querySelector("#samphint").style.display="block";
      URL.revokeObjectURL(url);
    };
    img.src=url;
  }
  wrap.querySelectorAll('input[type=file]').forEach(inp=> inp.addEventListener("change", e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); }));
  cv.addEventListener("click", e=>{
    const rect=cv.getBoundingClientRect();
    const x=Math.round((e.clientX-rect.left)/rect.width*cv.width);
    const y=Math.round((e.clientY-rect.top)/rect.height*cv.height);
    const s=4, x0=Math.max(0,x-s), y0=Math.max(0,y-s);
    const w=Math.min(cv.width-x0,s*2+1), h=Math.min(cv.height-y0,s*2+1);
    const d=ctx.getImageData(x0,y0,w,h).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
    picked=rgbToHex(r/n,g/n,b/n);
    wrap.querySelector("#pickrow").style.display="flex";
    wrap.querySelector("#pickSw").style.background=picked;
    wrap.querySelector("#pickTxt").innerHTML=picked+"<br>rgb("+hexToRgb(picked).join(", ")+")";
  });
  wrap.querySelector("#useBtn").addEventListener("click", ()=>{ if(picked){ cb(picked); close(); } });
}

/* ---- export / import ---- */
function exportData(){
  const blob=new Blob([JSON.stringify({app:"promarker-studio",version:1,exported:new Date().toISOString(),data:state},null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="promarker-collection.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  toast("Backup downloaded");
}
function importData(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      const inner=d.data||d;
      if(!inner||!Array.isArray(inner.owned)) throw 0;
      if(!confirm("Replace the collection on this device with the backup ("+inner.owned.length+" official + "+(inner.customs||[]).length+" custom colours)?")) return;
      state={owned:inner.owned||[], overrides:inner.overrides||{}, customs:inner.customs||[]};
      saveState(); renderAll(); toast("Backup restored");
    }catch(e){ toast("That file doesn't look like a Promarker Studio backup"); }
  };
  rd.readAsText(file);
}

/* ============ events + boot ============ */
document.getElementById("addBtn").addEventListener("click", openAdd);
document.getElementById("search").addEventListener("input", e=>{ ui.q=e.target.value; renderView(); });
document.querySelectorAll(".tab").forEach(el=> el.addEventListener("click", ()=>{
  ui.tab=el.dataset.tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t===el));
  renderView();
}));
renderAll();

/* Gently warn people who opened this inside a social-app mini-browser,
   where storage can be wiped on close and "install" is often unavailable. */
(function inAppBrowserNotice(){
  const ua=navigator.userAgent||"";
  const inApp=/(FBAN|FBAV|Instagram|Line|Twitter|Snapchat|Pinterest|Reddit|TikTok|WebView|; wv\))/i.test(ua);
  if(!inApp) return;
  let dismissed=false;
  try{ dismissed=localStorage.getItem("pmk-inapp-dismissed")==="1"; }catch(e){}
  if(dismissed) return;
  const bar=document.createElement("div");
  bar.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:70;background:#211E1A;color:#FAF8F2;padding:12px 14px;font-size:13px;line-height:1.45;display:flex;gap:10px;align-items:flex-start";
  bar.innerHTML='<div style="flex:1">For the app to save your collection and let you install it, open it in your normal browser: tap your browser menu (⋯ or the share icon) and choose <b>“Open in browser”</b>.</div>'+
    '<button style="border:1.4px solid #FAF8F2;background:transparent;color:#FAF8F2;border-radius:8px;padding:5px 10px;font:inherit;flex-shrink:0">Got it</button>';
  bar.querySelector("button").addEventListener("click", ()=>{ try{ localStorage.setItem("pmk-inapp-dismissed","1"); }catch(e){} bar.remove(); });
  document.body.appendChild(bar);
})();

if("serviceWorker" in navigator && (location.protocol==="https:"||location.hostname==="localhost")){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
